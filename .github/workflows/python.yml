name: Python API

on:
  push:
    branches: ["master"]
  pull_request:
    branches: ["master"]

jobs:
  python_package:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-24.04, ubuntu-22.04, ubuntu-24.04-arm, ubuntu-22.04-arm]
    steps:
      - uses: actions/checkout@v6
      - name: Set up Python3
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libeigen3-dev libtbb-dev libopencv-dev libsuitesparse-dev
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
      - name: Build pip package
        run: |
          python -m pip install --verbose ./python/
      - name: Test import
        run: |
          python -c "from vegvisir.vegvisir import Vegvisir, VegvisirConfig; print('import ok')"
