name: ROS2 nodes

on:
  push:
    branches: ["master"]
  pull_request:
    branches: ["master"]

permissions: {}

jobs:
  ros2_node:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      matrix:
        release: [humble, jazzy]
    container: osrf/ros:${{ matrix.release }}-desktop
    steps:
      - name: Setup cmake
        uses: jwlawson/actions-setup-cmake@0d6a7d60b009d01c9e7523be22153ff8f19460d3 # v2.2.0
        with:
          cmake-version: "3.25.x"
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Import dependencies
        working-directory: ros2
        run: vcs import src < vegvisir.repos
      - name: Run colcon
        working-directory: ros2
        run: source /opt/ros/${{ matrix.release }}/setup.bash && colcon build --event-handlers console_direct+
        shell: bash
